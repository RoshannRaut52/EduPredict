<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard | EduPredict</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #e8eaec, #c7c8c9);
      color: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #000;
      color: #fff;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
    }

    .nav-links a {
      color: #fff;
      text-decoration: none;
      margin-left: 20px;
      font-weight: 500;
      transition: color 0.3s;
    }

    .nav-links a:hover {
      color: #10ac84;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 50px 20px;
    }

    .dashboard-container {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      padding: 40px;
      border-radius: 20px;
      width: 90%;
      max-width: 900px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      animation: fadeIn 0.8s ease forwards;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #000;
    }

    .student-info {
      background: #f1f2f6;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 25px;
    }

    .student-info h3 {
      color: #000;
      margin-bottom: 10px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
    }

    .info-grid div {
      padding: 10px;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #fff;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
      text-align: center;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h3 {
      margin-bottom: 10px;
    }

    .logout-btn {
      margin-top: 40px;
      background: #000;
      color: #fff;
      border: none;
      padding: 12px 25px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .logout-btn:hover {
      background: #b30000;
      transform: scale(1.05);
    }

    footer {
      text-align: center;
      background: #000;
      color: #fff;
      padding: 15px;
      font-size: 0.9rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">EduPredict</div>
    <div class="nav-links">
      <a href="#">Dashboard</a>
      <a href="#">Profile</a>
      <a href="#">Courses</a>
      <a href="#" id="logout">Logout</a>
    </div>
  </header>

  <main>
    <div class="dashboard-container">
      <h2>🎓 Welcome, <span id="studentName">Student</span></h2>

      <div class="student-info">
        <h3>Your Details</h3>
        <div class="info-grid" id="studentDetails"></div>
      </div>

      <div class="cards">
        <div class="card">
          <h3>📊 Academic Progress</h3>
          <p id="academicStatus">Loading...</p>
        </div>

        <div class="card">
          <h3>🧠 Dropout Prediction</h3>
          <p id="predictionResult">Analyzing...</p>
        </div>

        <div class="card">
          <h3>📅 Attendance</h3>
          <p id="attendanceInfo">Loading...</p>
        </div>
      </div>

      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </main>

  <footer>
    &copy; 2025 EduPredict. All rights reserved.
  </footer>

  <script>
    // ✅ Load student data from localStorage
    const studentData = JSON.parse(localStorage.getItem('studentData'));

    if (!studentData) {
      alert("⚠️ No student data found. Please log in again.");
      window.location.href = "studentlogin.html";
    } else {
      document.getElementById("studentName").textContent = studentData.name || "Student";

      const infoContainer = document.getElementById("studentDetails");
      infoContainer.innerHTML = `
        <div><strong>Email:</strong> ${studentData.email || "N/A"}</div>
        <div><strong>Department:</strong> ${studentData.department || "N/A"}</div>
        <div><strong>Year:</strong> ${studentData.year || "N/A"}</div>
        <div><strong>Roll No:</strong> ${studentData.rollno || "N/A"}</div>
      `;

      // Example data (replace with your backend logic if you fetch these)
      document.getElementById("academicStatus").textContent = studentData.academicStatus || "Good Standing";
      document.getElementById("attendanceInfo").textContent = studentData.attendance || "85%";

      const prediction = studentData.prediction || "Likely to Graduate";
      document.getElementById("predictionResult").textContent = prediction;
      if (prediction.toLowerCase().includes("dropout")) {
        document.getElementById("predictionResult").style.color = "red";
      } else {
        document.getElementById("predictionResult").style.color = "green";
      }
    }

    // ✅ Logout function
    function logout() {
      localStorage.removeItem("studentData");
      window.location.href = "student.html";
    }

    // Logout link in header
    document.getElementById("logout").addEventListener("click", logout);

document.getElementById('confidence').textContent = `${student.confidence}%` || 'N/A';
document.getElementById('recommendation').textContent = student.recommendation || '';

  </script>
</body>
</html>
