<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student Dashboard | EduPredict</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #e8eaec, #c7c8c9);
      color: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #000;
      color: #fff;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 700;
    }
    .nav-links a {
      color: #fff;
      text-decoration: none;
      margin-left: 20px;
      font-weight: 500;
      transition: color 0.3s;
    }
    .nav-links a:hover {
      color: #10ac84;
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 50px 20px;
    }
    .dashboard-container {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      padding: 40px;
      border-radius: 20px;
      width: 90%;
      max-width: 900px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #000;
    }
    .student-info {
      background: #f1f2f6;
      padding: 18px;
      border-radius: 16px;
      margin-bottom: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 30px;
      flex-wrap: wrap;
    }
    .profile-photo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #dfe4ea;
      object-fit: cover;
      margin-right: 24px;
      border: 2px solid #ccc;
    }
    .basic-details {
      flex: 3;
    }
    .basic-details h3 {
      margin: 0 0 4px 0;
    }
    .info-list {
      margin: 0;
      padding: 0;
      list-style-type: none;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 35px;
      font-size: 1rem;
      color: #555;
    }
    .info-list li {
      margin: 0;
    }
    .edit-profile-btn {
      background-color: #10ac84;
      border: none;
      color: #fff;
      border-radius: 8px;
      padding: 8px 18px;
      font-weight: bold;
      cursor: pointer;
    }
    .cards-section {
      display: flex;
      flex-wrap: wrap;
      gap: 26px;
      justify-content: space-between;
      margin-bottom: 25px;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.09);
      flex: 1 1 270px;
      padding: 22px 26px 18px 26px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card h3 {
      margin-top: 0;
      margin-bottom: 12px;
      color: #10ac84;
    }
    .progress-bar {
      background: #ddd;
      border-radius: 12px;
      overflow: hidden;
      height: 18px;
    }
    .progress-bar div {
      height: 18px;
      background: #10ac84;
      width: 0;
      transition: width 0.5s ease;
    }
    .editable {
      border: 1px dashed #aaa;
      padding: 6px 8px;
      border-radius: 6px;
      min-height: 20px;
    }
    .save-btn {
      background-color: #10ac84;
      border: none;
      color: #fff;
      border-radius: 8px;
      padding: 8px 12px;
      font-weight: bold;
      cursor: pointer;
      width: max-content;
      align-self: flex-start;
    }
    .notification-list {
      list-style: none;
      padding-left: 0;
      max-height: 120px;
      overflow-y: auto;
    }
    .notification-list li {
      background-color: #e9f7f5;
      margin-bottom: 6px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.95rem;
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">EduPredict</div>
    <nav class="nav-links">
      <a href="#">Home</a>
      <a href="#">Courses</a>
      <a href="#">Profile</a>
      <a href="#">Logout</a>
    </nav>
  </header>
  <main>
    <div class="dashboard-container">
      <h2>Student Dashboard</h2>
      <!-- Profile Section -->
      <div class="student-info">
        <img src="https://via.placeholder.com/80" alt="Profile Photo" class="profile-photo" id="profilePhoto" />
        <div class="basic-details">
          <h3 contenteditable="true" class="editable" id="studentName">John Doe</h3>
          <ul class="info-list">
            <li>Roll No: <span contenteditable="true" class="editable" id="rollNo">123456</span></li>
            <li>Branch: <span contenteditable="true" class="editable" id="branch">Computer Science</span></li>
            <li>Year: <span contenteditable="true" class="editable" id="year">3rd</span></li>
          </ul>
        </div>
        <button class="edit-profile-btn save-btn" onclick="saveProfile()">Save Profile</button>
      </div>
      <!-- Cards Section -->
      <div class="cards-section">
        <!-- Academic Progress Card -->
        <div class="card">
          <h3>Academic Progress</h3>
          <label>Semester 1: <span contenteditable="true" class="editable" id="sem1">82%</span></label>
          <div class="progress-bar"><div id="sem1Bar"></div></div>
          <label>Semester 2: <span contenteditable="true" class="editable" id="sem2">76%</span></label>
          <div class="progress-bar"><div id="sem2Bar"></div></div>
          <label>Semester 3: <span contenteditable="true" class="editable" id="sem3">88%</span></label>
          <div class="progress-bar"><div id="sem3Bar"></div></div>
          <button class="save-btn" onclick="saveAcademic()">Save Academic</button>
        </div>
        <!-- Attendance Card -->
        <div class="card">
          <h3>Attendance</h3>
          <label>Attendance Percentage: <span contenteditable="true" class="editable" id="attendancePercent">90%</span></label>
          <div class="progress-bar"><div id="attendanceBar"></div></div>
          <button class="save-btn" onclick="saveAttendance()">Save Attendance</button>
        </div>
        <!-- Notifications Card -->
        <div class="card">
          <h3>Notifications</h3>
          <ul contenteditable="true" class="editable notification-list" id="notifications">
            <li>Exam scheduled on 15th Oct</li>
            <li>Project submission deadline extended</li>
            <li>New syllabus released for Semester 4</li>
          </ul>
          <button class="save-btn" onclick="saveNotifications()">Save Notifications</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    // Utility to set progress bar width based on percentage string like "82%"
    function setProgressBar(id, value) {
      const el = document.getElementById(id);
      if (el) {
        let number = parseInt(value);
        if (!isNaN(number)) {
          if (number < 0) number = 0;
          if (number > 100) number = 100;
          el.style.width = number + '%';
        }
      }
    }

    // Save profile info to localStorage
    function saveProfile() {
      localStorage.setItem('studentName', document.getElementById('studentName').innerText.trim());
      localStorage.setItem('rollNo', document.getElementById('rollNo').innerText.trim());
      localStorage.setItem('branch', document.getElementById('branch').innerText.trim());
      localStorage.setItem('year', document.getElementById('year').innerText.trim());
      alert('Profile saved!');
    }

    // Save academic progress info
    function saveAcademic() {
      localStorage.setItem('sem1', document.getElementById('sem1').innerText.trim());
      localStorage.setItem('sem2', document.getElementById('sem2').innerText.trim());
      localStorage.setItem('sem3', document.getElementById('sem3').innerText.trim());
      updateProgressBars();
      alert('Academic progress saved!');
    }

    // Save attendance info
    function saveAttendance() {
      localStorage.setItem('attendancePercent', document.getElementById('attendancePercent').innerText.trim());
      updateProgressBars();
      alert('Attendance saved!');
    }

    // Save notifications info
    function saveNotifications() {
      const notificationList = document.getElementById('notifications').innerText.trim();
      localStorage.setItem('notifications', notificationList);
      alert('Notifications saved!');
    }

    // Load saved data on page load
    function loadDashboard() {
      if (localStorage.getItem('studentName')) {
        document.getElementById('studentName').innerText = localStorage.getItem('studentName');
        document.getElementById('rollNo').innerText = localStorage.getItem('rollNo');
        document.getElementById('branch').innerText = localStorage.getItem('branch');
        document.getElementById('year').innerText = localStorage.getItem('year');
      }
      if (localStorage.getItem('sem1')) {
        document.getElementById('sem1').innerText = localStorage.getItem('sem1');
      }
      if (localStorage.getItem('sem2')) {
        document.getElementById('sem2').innerText = localStorage.getItem('sem2');
      }
      if (localStorage.getItem('sem3')) {
        document.getElementById('sem3').innerText = localStorage.getItem('sem3');
      }
      if (localStorage.getItem('attendancePercent')) {
        document.getElementById('attendancePercent').innerText = localStorage.getItem('attendancePercent');
      }
      if (localStorage.getItem('notifications')) {
        document.getElementById('notifications').innerText = localStorage.getItem('notifications');
      }
      updateProgressBars();
    }

    // Update progress bars appearance based on text values
    function updateProgressBars() {
      setProgressBar('sem1Bar', document.getElementById('sem1').innerText);
      setProgressBar('sem2Bar', document.getElementById('sem2').innerText);
      setProgressBar('sem3Bar', document.getElementById('sem3').innerText);
      setProgressBar('attendanceBar', document.getElementById('attendancePercent').innerText);
    }

    window.onload = loadDashboard;
  </script>
</body>
</html>
