<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Departments - EduPredict</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== ANIMATED BACKGROUND ===== */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .bg-animation .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      animation: orbFloat 15s ease-in-out infinite alternate;
    }

    .bg-animation .orb:nth-child(1) {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(16, 172, 132, 0.3), transparent);
      top: -100px;
      left: -100px;
      animation-delay: 0s;
    }

    .bg-animation .orb:nth-child(2) {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(238, 121, 57, 0.2), transparent);
      bottom: -150px;
      right: -150px;
      animation-delay: -5s;
    }

    .bg-animation .orb:nth-child(3) {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(57, 135, 48, 0.2), transparent);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -10s;
    }

    @keyframes orbFloat {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(100px, -50px) scale(1.1); }
      66% { transform: translate(-50px, 100px) scale(0.9); }
      100% { transform: translate(50px, -30px) scale(1.05); }
    }

    /* ===== FLOATING PARTICLES ===== */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      animation: particleFloat 20s infinite linear;
    }

    @keyframes particleFloat {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
    }

    /* ===== HEADER ===== */
    header {
      width: 100%;
      background: rgba(10, 10, 15, 0.7);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      backdrop-filter: blur(20px) saturate(180%);
      position: sticky;
      top: 0;
      padding: 15px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .college-brand {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .college-brand .logo-icon {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #10ac84, #ee7939);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #fff;
      border: 2px solid rgba(255, 255, 255, 0.1);
    }

    .college-brand h1 {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #10ac84, #ee7939);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .top-right {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .top-right a {
      text-decoration: none;
      color: rgba(255, 255, 255, 0.6);
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 500;
      transition: all 0.3s ease;
      font-size: 0.95rem;
    }

    .top-right a:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
    }

    .top-right a.active {
      background: rgba(16, 172, 132, 0.1);
      color: #10ac84;
      border: 1px solid rgba(16, 172, 132, 0.2);
    }

    /* ===== MAIN ===== */
    main {
      width: 100%;
      max-width: 1100px;
      padding: 40px 20px;
      box-sizing: border-box;
      flex: 1;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .page-header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.9);
    }

    .page-header h1 i {
      color: #10ac84;
      margin-right: 10px;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 24px;
      border-radius: 10px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #10ac84, #0d8c6b);
      color: #fff;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(16, 172, 132, 0.3);
    }

    .btn-danger {
      background: rgba(255, 0, 0, 0.1);
      border: 1px solid rgba(255, 0, 0, 0.2);
      color: #ff6b6b;
    }

    .btn-danger:hover {
      background: rgba(255, 0, 0, 0.2);
      transform: translateY(-2px);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ===== DEPARTMENTS LIST ===== */
    .departments-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .department {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 25px 30px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .department:hover {
      border-color: rgba(16, 172, 132, 0.2);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    .department-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.2rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.9);
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    .department-header .dept-code {
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.9rem;
      font-weight: 400;
    }

    .department-header .dept-code i {
      color: #10ac84;
      margin-right: 5px;
    }

    .expand-icon {
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.3);
      transition: transform 0.3s ease;
    }

    .expand-icon.expanded {
      transform: rotate(90deg);
    }

    /* ===== YEAR PANEL ===== */
    .year-panel {
      margin-top: 18px;
      display: none;
      flex-wrap: wrap;
      gap: 15px;
    }

    .year-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      flex: 1 1 170px;
      border-radius: 12px;
      padding: 15px 20px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .year-card:hover {
      transform: translateY(-5px);
      border-color: rgba(16, 172, 132, 0.2);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .year-card h4 {
      color: rgba(255, 255, 255, 0.8);
      font-weight: 700;
      margin-bottom: 10px;
      font-size: 1rem;
    }

    .stats-list {
      list-style: none;
      font-weight: 500;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.6);
    }

    .stats-list li {
      margin-bottom: 4px;
    }

    .stats-list li i {
      margin-right: 6px;
    }

    .stats-list .stat-total { color: #2e86de; }
    .stats-list .stat-saved { color: #10ac84; }
    .stats-list .stat-risk { color: #ee7939; }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255, 255, 255, 0.3);
    }

    .empty-state i {
      font-size: 3rem;
      display: block;
      margin-bottom: 15px;
      color: rgba(16, 172, 132, 0.3);
    }

    .empty-state p {
      font-size: 1.1rem;
    }

    /* ===== LOADING ===== */
    .loading {
      text-align: center;
      padding: 40px;
      color: rgba(255, 255, 255, 0.5);
    }

    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.05);
      border-top: 3px solid #10ac84;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: rgba(20, 20, 30, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      width: 420px;
      max-width: 92vw;
      padding: 30px 35px;
      box-shadow: 0 50px 100px rgba(0, 0, 0, 0.5);
      animation: fadeInUp 0.4s ease;
    }

    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .modal h3 {
      font-size: 1.4rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 20px;
      text-align: center;
    }

    .modal h3 i {
      color: #10ac84;
      margin-right: 10px;
    }

    .modal label {
      font-weight: 500;
      display: block;
      margin-bottom: 5px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.85rem;
    }

    .modal input,
    .modal select {
      width: 100%;
      padding: 10px 14px;
      margin-bottom: 18px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
    }

    .modal input:focus,
    .modal select:focus {
      border-color: #10ac84;
      box-shadow: 0 0 0 4px rgba(16, 172, 132, 0.1);
    }

    .modal select option {
      background: #1a1a2e;
      color: #fff;
    }

    .modal .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 10px;
    }

    .modal .btn-group .btn {
      flex: 1;
      justify-content: center;
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      padding: 16px 24px;
      border-radius: 12px;
      background: rgba(10, 10, 15, 0.95);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      gap: 12px;
      z-index: 3000;
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      0% { transform: translateY(30px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    .toast.success { border-color: rgba(16, 172, 132, 0.3); }
    .toast.success i { color: #10ac84; }
    .toast.error { border-color: rgba(255, 0, 0, 0.3); }
    .toast.error i { color: #ff6b6b; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      header {
        padding: 15px 20px;
        flex-wrap: wrap;
        gap: 10px;
      }

      .college-brand h1 {
        font-size: 1.2rem;
      }

      .college-brand .logo-icon {
        width: 40px;
        height: 40px;
        font-size: 1.2rem;
      }

      main {
        padding: 20px 15px;
      }

      .page-header {
        flex-direction: column;
        align-items: stretch;
      }

      .page-header h1 {
        font-size: 1.5rem;
      }

      .btn-group {
        justify-content: center;
      }

      .department {
        padding: 18px 20px;
      }

      .year-card {
        flex-basis: 100%;
      }

      .modal {
        padding: 25px 20px;
      }
    }

    @media (max-width: 480px) {
      .top-right a {
        padding: 6px 10px;
        font-size: 0.8rem;
      }

      .btn {
        padding: 8px 16px;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>

  <!-- ===== BACKGROUND EFFECTS ===== -->
  <div class="bg-animation">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>
  <div class="particles" id="particles"></div>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="college-brand">
      <div class="logo-icon"><i class="fas fa-university" aria-hidden="true"></i></div>
      <h1 id="collegeName">EduPredict</h1>
    </div>
    <nav class="top-right" aria-label="Primary Navigation">
      <a href="college.html"><i class="fas fa-home" aria-hidden="true"></i> Home</a>
      <a href="collegedepartments.html" class="active" aria-current="page"><i class="fas fa-building" aria-hidden="true"></i> Departments</a>
      <a href="analytics.html"><i class="fas fa-chart-line" aria-hidden="true"></i> Analytics</a>
      <a href="contact.html"><i class="fas fa-envelope" aria-hidden="true"></i> Contact</a>
    </nav>
  </header>

  <!-- ===== MAIN ===== -->
  <main>
    <div class="page-header">
      <h1><i class="fas fa-building" aria-hidden="true"></i> Departments Overview</h1>
      <div class="btn-group">
        <button class="btn btn-primary" id="addDepartmentBtn" aria-haspopup="dialog">
          <i class="fas fa-plus" aria-hidden="true"></i> Add Department
        </button>
        <button class="btn btn-danger" id="removeDepartmentBtn" aria-haspopup="dialog">
          <i class="fas fa-trash" aria-hidden="true"></i> Remove Department
        </button>
      </div>
    </div>

    <div class="departments-list" id="departmentsList" aria-live="polite">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading departments...</p>
      </div>
    </div>
  </main>

  <!-- ===== ADD DEPARTMENT MODAL ===== -->
  <div class="modal-overlay" id="addDeptModal" role="dialog" aria-modal="true">
    <div class="modal">
      <h3><i class="fas fa-plus-circle" aria-hidden="true"></i> Add New Department</h3>
      <form id="addDeptForm">
        <label for="newDeptName">Department Name</label>
        <input type="text" id="newDeptName" required placeholder="e.g., Computer Science" />

        <label for="newDeptCode">Department Code</label>
        <input type="number" id="newDeptCode" required placeholder="e.g., 101" />

        <div class="btn-group">
          <button type="submit" class="btn btn-primary" id="submitAddBtn">
            <i class="fas fa-save" aria-hidden="true"></i> Add Department
          </button>
          <button type="button" class="btn btn-danger" id="cancelAddDeptBtn">
            <i class="fas fa-times" aria-hidden="true"></i> Cancel
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== REMOVE DEPARTMENT MODAL ===== -->
  <div class="modal-overlay" id="removeDeptModal" role="dialog" aria-modal="true">
    <div class="modal">
      <h3><i class="fas fa-trash-alt" aria-hidden="true"></i> Remove Department</h3>
      <form id="removeDeptForm">
        <label for="removeDeptSelect">Select Department</label>
        <select id="removeDeptSelect" required>
          <option value="">-- Select Department --</option>
        </select>

        <div class="btn-group">
          <button type="submit" class="btn btn-danger" id="submitRemoveBtn">
            <i class="fas fa-trash" aria-hidden="true"></i> Remove Department
          </button>
          <button type="button" class="btn btn-primary" id="cancelRemoveDeptBtn">
            <i class="fas fa-times" aria-hidden="true"></i> Cancel
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== TOAST ===== -->
  <div class="toast" id="toast" role="alert" aria-live="polite">
    <i class="fas fa-check-circle" aria-hidden="true"></i>
    <span id="toastMessage">Success!</span>
  </div>

  <script>
    // ===== PARTICLES =====
    (function createParticles() {
      var container = document.getElementById('particles');
      for (var i = 0; i < 50; i++) {
        var particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        var size = (Math.random() * 4 + 2);
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.animationDuration = (Math.random() * 20 + 15) + 's';
        particle.style.animationDelay = (Math.random() * 20) + 's';
        particle.style.opacity = Math.random() * 0.5 + 0.2;
        container.appendChild(particle);
      }
    })();

    // ===== TOAST =====
    function showToast(message, type) {
      var toast = document.getElementById('toast');
      var msg = document.getElementById('toastMessage');
      toast.className = 'toast ' + (type || 'success');
      msg.textContent = message;
      toast.style.display = 'flex';
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(function() {
        toast.style.display = 'none';
      }, 3000);
    }

    // ===== CONFIGURATION =====
    var backendUrl = 'https://edupredict-l9eg.onrender.com';
    var departmentsData = [];
    var collegeCode = null;
    var authToken = null;

    // ===== AUTHENTICATION =====
    function checkAuthentication() {
      authToken = localStorage.getItem('collegeToken');
      var collegeDataStr = localStorage.getItem('collegeData');

      if (!authToken || !collegeDataStr) {
        showToast('Please login first.', 'error');
        setTimeout(function() {
          window.location.href = '../login/college.html';
        }, 1500);
        return false;
      }

      try {
        var collegeData = JSON.parse(collegeDataStr);
        collegeCode = collegeData.code;

        if (!collegeCode) {
          showToast('Session error. Please login again.', 'error');
          localStorage.clear();
          setTimeout(function() {
            window.location.href = '../login/college.html';
          }, 1500);
          return false;
        }

        document.getElementById('collegeName').textContent = collegeData.name || 'EduPredict';
        return true;
      } catch (err) {
        showToast('Session error. Please login again.', 'error');
        localStorage.clear();
        setTimeout(function() {
          window.location.href = '../login/college.html';
        }, 1500);
        return false;
      }
    }

    // ===== LOAD DEPARTMENTS =====
    async function loadDepartments() {
      if (!checkAuthentication()) return;

      try {
        var response = await fetch(backendUrl + '/api/college/' + collegeCode + '/departments', {
          method: 'GET',
          headers: {
            'Authorization': 'Bearer ' + authToken,
            'Content-Type': 'application/json'
          }
        });

        if (!response.ok) {
          throw new Error('Failed to load departments');
        }

        var data = await response.json();
        departmentsData = data.departments || [];
        renderDepartments();
      } catch (error) {
        console.error('Error loading departments:', error);
        document.getElementById('departmentsList').innerHTML =
          '<div class="empty-state"><i class="fas fa-exclamation-circle" aria-hidden="true"></i><p>Failed to load departments. Please try again.</p><button class="btn btn-primary" onclick="loadDepartments()" style="margin-top:20px;"><i class="fas fa-sync" aria-hidden="true"></i> Retry</button></div>';
      }
    }

    // ===== RENDER DEPARTMENTS =====
    function renderDepartments() {
      var listEl = document.getElementById('departmentsList');
      listEl.innerHTML = '';

      if (departmentsData.length === 0) {
        listEl.innerHTML = '<div class="empty-state"><i class="fas fa-building" aria-hidden="true"></i><p>No departments found. Add your first department!</p></div>';
        updateRemoveDeptOptions();
        return;
      }

      // Use document fragment for better performance
      var fragment = document.createDocumentFragment();
      departmentsData.forEach(function(dept) {
        fragment.appendChild(createDepartmentElement(dept));
      });
      listEl.appendChild(fragment);

      updateRemoveDeptOptions();
    }

    // ===== CREATE DEPARTMENT ELEMENT =====
    function createDepartmentElement(dept) {
      var deptDiv = document.createElement('div');
      deptDiv.className = 'department';
      deptDiv.setAttribute('tabindex', '0');
      deptDiv.setAttribute('role', 'listitem');

      var header = document.createElement('div');
      header.className = 'department-header';
      header.innerHTML = 
        '<span>' + dept.name + ' <span class="dept-code"><i class="fas fa-hashtag" aria-hidden="true"></i>' + dept.code + '</span></span>' +
        '<span class="expand-icon">&#9654;</span>';
      header.onclick = function() { toggleYears('years-' + dept.code, header); };
      deptDiv.appendChild(header);

      var yearsPanel = document.createElement('div');
      yearsPanel.className = 'year-panel';
      yearsPanel.id = 'years-' + dept.code;
      yearsPanel.style.display = 'none';

      fetchDepartmentYearSummary(dept.code).then(function(yearsSummary) {
        var years = ['1st Year', '2nd Year', '3rd Year', '4th Year'];
        years.forEach(function(year) {
          var stats = yearsSummary.find(function(y) { return y.year === year; }) || { total: 0, saved: 0, risk: 0 };
          var yearCard = document.createElement('div');
          yearCard.className = 'year-card';
          yearCard.setAttribute('role', 'listitem');
          yearCard.onclick = function() {
            window.location.href = 'studentList.html?dept=' + dept.code + '&year=' + encodeURIComponent(year);
          };
          yearCard.innerHTML = 
            '<h4>' + year + '</h4>' +
            '<ul class="stats-list">' +
            '<li><i class="fas fa-users stat-total" aria-hidden="true"></i> Total: ' + stats.total + '</li>' +
            '<li><i class="fas fa-check-circle stat-saved" aria-hidden="true"></i> Saved: ' + stats.saved + '</li>' +
            '<li><i class="fas fa-exclamation-triangle stat-risk" aria-hidden="true"></i> At Risk: ' + stats.risk + '</li>' +
            '</ul>';
          yearsPanel.appendChild(yearCard);
        });
      });

      deptDiv.appendChild(yearsPanel);
      return deptDiv;
    }

    // ===== FETCH DEPARTMENT YEAR SUMMARY =====
    async function fetchDepartmentYearSummary(deptId) {
      try {
        var response = await fetch(backendUrl + '/api/departments/' + deptId + '/years/summary', {
          headers: { 'Authorization': 'Bearer ' + authToken }
        });
        if (!response.ok) return [];
        var data = await response.json();
        return data.years || [];
      } catch (error) {
        console.error('Error fetching year summary:', error);
        return [];
      }
    }

    // ===== TOGGLE YEARS =====
    function toggleYears(panelId, headerEl) {
      var panel = document.getElementById(panelId);
      var icon = headerEl.querySelector('.expand-icon');
      var isVisible = panel.style.display === 'flex';

      if (isVisible) {
        panel.style.display = 'none';
        icon.classList.remove('expanded');
      } else {
        panel.style.display = 'flex';
        icon.classList.add('expanded');
      }
    }

    // ===== ADD DEPARTMENT =====
    async function addDepartment(departmentName, departmentCode) {
      var submitBtn = document.getElementById('submitAddBtn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin" aria-hidden="true"></i> Adding...';

      try {
        var response = await fetch(backendUrl + '/api/college/' + collegeCode + '/departments', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + authToken,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ name: departmentName, code: departmentCode || null })
        });

        var contentType = response.headers.get('content-type');
        if (!contentType || !contentType.includes('application/json')) {
          throw new Error('Server returned an invalid response.');
        }

        var result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || 'Failed to add department');
        }

        showToast('Department added successfully!', 'success');
        await loadDepartments();
        closeAddDeptModal();
      } catch (error) {
        console.error('Error adding department:', error);
        showToast('Error: ' + error.message, 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-save" aria-hidden="true"></i> Add Department';
      }
    }

    // ===== REMOVE DEPARTMENT =====
    async function removeDepartment(departmentCode) {
      var submitBtn = document.getElementById('submitRemoveBtn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin" aria-hidden="true"></i> Removing...';

      try {
        var response = await fetch(backendUrl + '/api/college/' + collegeCode + '/departments/' + departmentCode, {
          method: 'DELETE',
          headers: {
            'Authorization': 'Bearer ' + authToken,
            'Content-Type': 'application/json'
          }
        });

        if (!response.ok) {
          var error = await response.json();
          throw new Error(error.message || 'Failed to remove department');
        }

        showToast('Department removed successfully!', 'success');
        await loadDepartments();
        closeRemoveDeptModal();
      } catch (error) {
        console.error('Error removing department:', error);
        showToast('Error: ' + error.message, 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-trash" aria-hidden="true"></i> Remove Department';
      }
    }

    // ===== UPDATE REMOVE DEPARTMENT OPTIONS =====
    function updateRemoveDeptOptions() {
      var select = document.getElementById('removeDeptSelect');
      select.innerHTML = '<option value="">-- Select Department --</option>';
      departmentsData.forEach(function(dept) {
        var option = document.createElement('option');
        option.value = dept.code;
        option.textContent = dept.name + ' (' + dept.code + ')';
        select.appendChild(option);
      });
    }

    // ===== MODAL CONTROLS =====
    var addDeptBtn = document.getElementById('addDepartmentBtn');
    var removeDeptBtn = document.getElementById('removeDepartmentBtn');
    var addDeptModal = document.getElementById('addDeptModal');
    var removeDeptModal = document.getElementById('removeDeptModal');
    var cancelAddBtn = document.getElementById('cancelAddDeptBtn');
    var cancelRemoveBtn = document.getElementById('cancelRemoveDeptBtn');
    var addDeptForm = document.getElementById('addDeptForm');
    var removeDeptForm = document.getElementById('removeDeptForm');

    addDeptBtn.onclick = function() {
      addDeptModal.classList.add('active');
      document.getElementById('newDeptName').value = '';
      document.getElementById('newDeptCode').value = '';
      document.getElementById('newDeptName').focus();
    };

    removeDeptBtn.onclick = function() {
      if (departmentsData.length === 0) {
        showToast('No departments available to remove.', 'error');
        return;
      }
      removeDeptModal.classList.add('active');
    };

    function closeAddDeptModal() {
      addDeptModal.classList.remove('active');
    }

    function closeRemoveDeptModal() {
      removeDeptModal.classList.remove('active');
    }

    cancelAddBtn.onclick = closeAddDeptModal;
    cancelRemoveBtn.onclick = closeRemoveDeptModal;

    addDeptModal.onclick = function(e) {
      if (e.target === addDeptModal) closeAddDeptModal();
    };

    removeDeptModal.onclick = function(e) {
      if (e.target === removeDeptModal) closeRemoveDeptModal();
    };

    window.addEventListener('keydown', function(e) {
      if (e.key === "Escape") {
        closeAddDeptModal();
        closeRemoveDeptModal();
      }
    });

    // ===== FORM SUBMISSIONS =====
    addDeptForm.onsubmit = function(e) {
      e.preventDefault();
      var deptName = document.getElementById('newDeptName').value.trim();
      var deptCode = document.getElementById('newDeptCode').value.trim();

      if (!deptName) {
        showToast('Please enter a department name.', 'error');
        return;
      }

      if (departmentsData.some(function(d) { return d.name.toLowerCase() === deptName.toLowerCase(); })) {
        showToast('Department already exists.', 'error');
        return;
      }

      addDepartment(deptName, deptCode);
    };

    removeDeptForm.onsubmit = function(e) {
      e.preventDefault();
      var deptId = document.getElementById('removeDeptSelect').value;

      if (!deptId) {
        showToast('Please select a department to remove.', 'error');
        return;
      }

      if (confirm('Are you sure you want to remove this department? This action cannot be undone.')) {
        removeDepartment(deptId);
      }
    };

    // ===== INITIALIZE =====
    window.addEventListener('DOMContentLoaded', loadDepartments);
  </script>

</body>
</html>
