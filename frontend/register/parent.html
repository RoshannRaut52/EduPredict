<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parent Registration | EduPredict</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #b3b4b5 100%);
      color: #0a0808;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      background: #000;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: 2px;
      color: #fff;
    }

    .top-right a {
      text-decoration: none;
      color: #fff;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .top-right a:hover {
      transform: scale(1.1);
      background: rgba(255, 255, 255, 0.2);
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 50px 20px;
    }

    .register-container {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 20px;
      max-width: 500px;
      width: 100%;
      color: #000;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      text-align: center;
      animation: fadeIn 0.8s ease forwards;
    }

    .register-container h2 {
      font-size: 2rem;
      margin-bottom: 20px;
      color: #000;
    }

    .register-container form {
      display: flex;
      flex-direction: column;
      gap: 15px;
      text-align: left;
    }

    .register-container label {
      font-weight: 600;
    }

    .register-container input,
    .register-container select {
      padding: 12px;
      border: none;
      border-radius: 8px;
      outline: none;
      font-size: 1rem;
    }

    .register-container input:focus,
    .register-container select:focus {
      border: 2px solid #000;
    }

    .register-container button {
      background: #000;
      color: #fff;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .register-container button:hover {
      background: #10ac84;
      transform: scale(1.05);
    }

    .message {
      margin-top: 15px;
      text-align: center;
      font-weight: 600;
      font-size: 1rem;
    }

    .success { color: #007f00; }
    .error { color: #b30000; }

    .register-links {
      margin-top: 10px;
      text-align: center;
    }

    .register-links a {
      color: #000;
      text-decoration: none;
      font-weight: 500;
      margin: 0 5px;
      transition: all 0.3s ease;
    }

    .register-links a:hover {
      color: #10ac84;
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">EduPredict</div>
    <div class="top-right">
      <a href="index.html">Home</a>
    </div>
  </header>

  <main>
    <div class="register-container">
      <h2>👪 Parent Registration</h2>
      <form id="parentRegisterForm">
        <label>Parent Name</label>
        <input type="text" name="name" id="name" placeholder="Enter parent's full name" required>

        <label>Parent Email</label>
        <input type="email" name="email" id="email" placeholder="Enter parent's email" required>

        <label>Parent Phone Number</label>
        <input type="text" name="phone" id="phone" placeholder="Enter parent's phone number" required>

        <label>Student Email (Registered)</label>
        <input type="email" name="student_email" id="student_email" placeholder="Enter student's registered email" required>

        <label>Relationship to Student</label>
        <select name="relationship" id="relationship" required>
          <option value="">Select relationship</option>
          <option value="Father">Father</option>
          <option value="Mother">Mother</option>
          <option value="Guardian">Guardian</option>
          <option value="Other">Other</option>
        </select>

        <label>Password</label>
        <input type="password" name="password" id="password" placeholder="Create a password" required>

        <label>Confirm Password</label>
        <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm your password" required>

        <button type="submit">Register</button>
      </form>

      <div class="register-links">
        <a href="parent.html">Already have an account? Login</a>
      </div>

      <div class="message" id="message"></div>
    </div>
  </main>

  <script>
    const form = document.getElementById("parentRegisterForm");
    const messageDiv = document.getElementById("message");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      messageDiv.textContent = "";
      messageDiv.className = "message";

      const formData = {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        student_email: document.getElementById("student_email").value.trim(),
        relationship: document.getElementById("relationship").value,
        password: document.getElementById("password").value,
        confirm_password: document.getElementById("confirm_password").value
      };

      try {
        const res = await fetch("/register/parent", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(formData)
        });

        const data = await res.json();

        if (res.ok) {
          messageDiv.textContent = data.message;
          messageDiv.classList.add("success");
          form.reset();
          
          setTimeout(() => {
            window.location.href = "parent.html";
          }, 2000);
        } else {
          messageDiv.textContent = data.message;
          messageDiv.classList.add("error");
        }
      } catch (err) {
        messageDiv.textContent = "⚠️ Connection error. Please try again.";
        messageDiv.classList.add("error");
      }
    });
  </script>
</body>
</html>
